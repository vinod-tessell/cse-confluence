name: Refresh CSE Customer Dashboards
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # allow manual trigger from GitHub UI
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Install dependencies
        run: pip install requests
      - name: Generate dashboards
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python generate_dashboards.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *_dashboard.html *_dashboard.js master_dashboard.html customers.json
          git diff --cached --quiet || git commit -m "chore: refresh dashboards [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
